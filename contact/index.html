<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact — sencha house</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Oswald:wght@400;700&family=Playfair+Display:ital,wght@0,400;1,400&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="contact.css">
</head>
<body>

  <nav class="nav">
    <a href="/">sencha house</a>
    <a href="/story/">the story</a>
  </nav>

  <section class="section contact-page">
    <div class="container narrow">
      <h1 class="fade-up text-center">contact</h1>
      <p class="accent fade-up delay-1 text-center" style="margin-top: 1rem; opacity: 0.7;">
        Write to us. Every inquiry is read personally.
      </p>

      <form class="contact-form fade-up delay-2" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-group">
          <label for="name">name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="subject">subject</label>
          <input type="text" id="subject" name="subject">
        </div>
        <div class="form-group">
          <label for="message">message</label>
          <textarea id="message" name="message" rows="6" required></textarea>
        </div>
        <button type="submit" class="btn">send</button>
      </form>

      <p class="fade-up delay-3 text-center" style="margin-top: 3rem; font-size: 0.85rem; opacity: 0.5;">
        Or reach us directly at <a href="mailto:hello@sencha-house.com">hello@sencha-house.com</a>
      </p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
  <script src="../js/motion.js"></script>
</body>
</html>
