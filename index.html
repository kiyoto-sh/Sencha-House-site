<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sencha House | Ikeda Europe</title>
  <meta name="description" content="Premium Japanese Green Tea. Sencha House for experiences and discovery. Ikeda Europe for wholesale trade.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Lato:wght@300;400&family=Plus+Jakarta+Sans:wght@400;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">

  <!-- GSAP + ScrollTrigger + Lenis -->
  <script src="js/vendor/gsap.min.js"></script>
  <script src="js/vendor/ScrollTrigger.min.js"></script>
  <script src="js/vendor/lenis.min.js"></script>

  <style>
    /* ========================================
       TOKENS
       ======================================== */
    :root {
      /* Sencha House palette */
      --sh-ivory: #E6DAB8;
      --sh-kabuse: #08190E;
      --sh-red: #FF0033;

      /* Ikeda Europe palette */
      --ie-ocean: #002633;
      --ie-white: #FFFFFF;
      --ie-red: #FF0033;

      /* Shared */
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    /* ========================================
       RESET
       ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { text-decoration: none; color: inherit; }

    /* ========================================
       LOADER
       ======================================== */
    .loader {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #FAFAF8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loader-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 300;
      font-style: italic;
      color: var(--sh-kabuse);
      opacity: 0;
    }

    /* ========================================
       HOMEPAGE SPLIT
       ======================================== */
    .homepage {
      display: flex;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
    }

    .panel {
      position: relative;
      height: 100%;
      overflow: hidden;
      cursor: pointer;
      will-change: flex;
      flex: 1 1 50%;
      transition: flex 0s; /* GSAP handles this */
    }

    /* ----------------------------------------
       VIDEO / BACKGROUND LAYER
       ---------------------------------------- */
    .panel-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .panel-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Fallback gradients until real video is added */
    .panel--sh .panel-bg {
      background:
        linear-gradient(
          170deg,
          #3a5a2c 0%,
          #2d4a22 30%,
          #1a3015 60%,
          #0d1f0a 100%
        );
    }

    .panel--ie .panel-bg {
      background:
        linear-gradient(
          190deg,
          #d4d8d9 0%,
          #a8b5ba 25%,
          #6b8a95 55%,
          #003040 100%
        );
    }

    /* Color overlay */
    .panel-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      transition: opacity 0.8s var(--ease-in-out);
    }

    .panel--sh .panel-overlay {
      background: rgba(230, 218, 184, 0.72);
    }

    .panel--ie .panel-overlay {
      background: rgba(255, 255, 255, 0.68);
    }

    /* Hover: overlay gets slightly more transparent to reveal video */
    .panel--sh:hover .panel-overlay {
      background: rgba(230, 218, 184, 0.58);
    }

    .panel--ie:hover .panel-overlay {
      background: rgba(255, 255, 255, 0.55);
    }

    /* ----------------------------------------
       CONTENT LAYER
       ---------------------------------------- */
    .panel-content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(2rem, 5vw, 5rem);
    }

    /* ----------------------------------------
       SENCHA HOUSE PANEL
       ---------------------------------------- */
    .panel--sh .panel-content {
      align-items: flex-start;
    }

    .sh-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.75rem, 1.2vw, 1rem);
      color: var(--sh-kabuse);
      letter-spacing: 0.08em;
      margin-bottom: 1.5rem;
      opacity: 0;
    }

    .sh-wordmark {
      color: var(--sh-kabuse);
      margin-bottom: 0.5rem;
      opacity: 0;
    }

    .sh-wordmark-sencha {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: clamp(2.5rem, 5.5vw, 5.5rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 0.9;
      display: block;
    }

    .sh-wordmark-house {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(2rem, 4.5vw, 4.5rem);
      letter-spacing: 0.02em;
      display: inline;
      margin-left: 0.3em;
      line-height: 1;
    }

    .sh-guided {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: clamp(0.55rem, 0.7vw, 0.7rem);
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sh-kabuse);
      margin-top: 1rem;
      opacity: 0;
    }

    .sh-enter {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(0.85rem, 1vw, 1rem);
      color: var(--sh-kabuse);
      margin-top: 3rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 0;
      transition: gap 0.4s var(--ease-out-expo);
    }

    .sh-enter:hover {
      gap: 1.25rem;
    }

    .sh-enter-arrow {
      width: 2rem;
      height: 1px;
      background: var(--sh-kabuse);
      position: relative;
      transition: width 0.4s var(--ease-out-expo);
    }

    .sh-enter:hover .sh-enter-arrow {
      width: 3rem;
    }

    .sh-enter-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 8px;
      height: 8px;
      border-right: 1px solid var(--sh-kabuse);
      border-top: 1px solid var(--sh-kabuse);
      transform: rotate(45deg);
    }

    /* ----------------------------------------
       IKEDA EUROPE PANEL
       ---------------------------------------- */
    .panel--ie .panel-content {
      align-items: flex-end;
      text-align: right;
    }

    .ie-trade-stamp {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.55rem, 0.65vw, 0.65rem);
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--ie-red);
      border: 1.5px solid var(--ie-red);
      padding: 0.3em 0.8em;
      margin-bottom: 1.5rem;
      opacity: 0;
    }

    .ie-wordmark {
      color: var(--ie-ocean);
      margin-bottom: 0.25rem;
      opacity: 0;
    }

    .ie-wordmark-ikeda {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: clamp(2.5rem, 5.5vw, 5.5rem);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 0.9;
      display: block;
    }

    .ie-wordmark-europe {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: clamp(0.8rem, 1.2vw, 1.15rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      display: block;
      margin-top: 0.4rem;
    }

    .ie-sub {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 400;
      font-size: clamp(0.65rem, 0.75vw, 0.75rem);
      letter-spacing: 0.12em;
      color: var(--ie-ocean);
      margin-top: 1rem;
      opacity: 0;
    }

    .ie-enter {
      font-family: 'Space Mono', monospace;
      font-weight: 400;
      font-size: clamp(0.7rem, 0.8vw, 0.8rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ie-ocean);
      margin-top: 3rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.75rem;
      opacity: 0;
      transition: gap 0.4s var(--ease-out-expo);
    }

    .ie-enter:hover {
      gap: 1.25rem;
    }

    .ie-enter-arrow {
      width: 2rem;
      height: 1px;
      background: var(--ie-ocean);
      position: relative;
      transition: width 0.4s var(--ease-out-expo);
    }

    .ie-enter:hover .ie-enter-arrow {
      width: 3rem;
    }

    .ie-enter-arrow::after {
      content: '';
      position: absolute;
      right: 0;
      top: -3px;
      width: 8px;
      height: 8px;
      border-right: 1px solid var(--ie-ocean);
      border-top: 1px solid var(--ie-ocean);
      transform: rotate(45deg);
    }

    /* ----------------------------------------
       CENTER DIVIDER
       ---------------------------------------- */
    .divider {
      position: fixed;
      top: 0;
      left: 50%;
      width: 1px;
      height: 100%;
      background: rgba(0, 0, 0, 0.08);
      z-index: 10;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ----------------------------------------
       CORNER MARK (Sh)
       ---------------------------------------- */
    .corner-mark {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.4rem;
      color: var(--sh-kabuse);
      mix-blend-mode: difference;
      pointer-events: none;
      opacity: 0;
    }

    /* ----------------------------------------
       BOTTOM BAR
       ---------------------------------------- */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem clamp(1.5rem, 4vw, 3rem);
      pointer-events: none;
    }

    .bottom-bar span {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0;
    }

    .bottom-left {
      color: var(--sh-kabuse);
    }

    .bottom-right {
      color: var(--ie-ocean);
    }

    /* ----------------------------------------
       SVG DISPLACEMENT FILTER (subtle water)
       ---------------------------------------- */
    .svg-filters {
      position: absolute;
      width: 0;
      height: 0;
      overflow: hidden;
    }

    /* ----------------------------------------
       MOBILE
       ---------------------------------------- */
    @media (max-width: 768px) {
      .homepage {
        flex-direction: column;
      }

      .panel {
        flex: 1 1 50%;
        min-height: 50dvh;
      }

      .divider {
        top: 50%;
        left: 0;
        width: 100%;
        height: 1px;
        transform: translateY(-50%);
      }

      .panel--sh .panel-content {
        justify-content: flex-end;
        padding-bottom: 3rem;
      }

      .panel--ie .panel-content {
        justify-content: flex-start;
        padding-top: 3rem;
      }

      .sh-wordmark-sencha {
        font-size: clamp(2rem, 12vw, 3.5rem);
      }

      .sh-wordmark-house {
        font-size: clamp(1.6rem, 10vw, 2.8rem);
      }

      .ie-wordmark-ikeda {
        font-size: clamp(2rem, 12vw, 3.5rem);
      }
    }

    /* ----------------------------------------
       REDUCED MOTION
       ---------------------------------------- */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- SVG Filters for subtle displacement effects -->
  <svg class="svg-filters">
    <defs>
      <filter id="gentle-ripple">
        <feTurbulence
          type="fractalNoise"
          baseFrequency="0.012 0.008"
          numOctaves="3"
          seed="2"
          result="noise"
        />
        <feDisplacementMap
          in="SourceGraphic"
          in2="noise"
          scale="4"
          xChannelSelector="R"
          yChannelSelector="G"
        />
      </filter>
    </defs>
  </svg>

  <!-- Loader -->
  <div class="loader" aria-hidden="true">
    <span class="loader-mark">Sh</span>
  </div>

  <!-- Corner mark -->
  <div class="corner-mark" aria-hidden="true">Sh</div>

  <!-- Main split -->
  <main class="homepage">

    <!-- ====== SENCHA HOUSE PANEL ====== -->
    <a href="/sencha-house/" class="panel panel--sh" data-panel="sh">
      <div class="panel-bg">
        <video autoplay muted loop playsinline>
          <source src="https://videos.pexels.com/video-files/5929428/5929428-hd_1920_1080_25fps.mp4" type="video/mp4">
        </video>
      </div>
      <div class="panel-overlay"></div>
      <div class="panel-content">
        <span class="sh-tagline">Premium Japanese Green Tea</span>
        <div class="sh-wordmark">
          <span class="sh-wordmark-sencha">SENCHA</span>
          <span class="sh-wordmark-house">house</span>
        </div>
        <span class="sh-guided">Guided by Ikeda</span>
        <div class="sh-enter">
          <span>Discover</span>
          <span class="sh-enter-arrow"></span>
        </div>
      </div>
    </a>

    <!-- ====== IKEDA EUROPE PANEL ====== -->
    <a href="/ikeda-europe/" class="panel panel--ie" data-panel="ie">
      <div class="panel-bg">
        <video autoplay muted loop playsinline>
          <source src="https://videos.pexels.com/video-files/3985699/3985699-hd_1920_1080_30fps.mp4" type="video/mp4">
        </video>
      </div>
      <div class="panel-overlay"></div>
      <div class="panel-content">
        <span class="ie-trade-stamp">Trade</span>
        <div class="ie-wordmark">
          <span class="ie-wordmark-ikeda">IKEDA</span>
          <span class="ie-wordmark-europe">Europe</span>
        </div>
        <span class="ie-sub">Kagoshima Prefecture &middot; Since 1945</span>
        <div class="ie-enter">
          <span>Enter</span>
          <span class="ie-enter-arrow"></span>
        </div>
      </div>
    </a>

  </main>

  <!-- Divider -->
  <div class="divider" aria-hidden="true"></div>

  <!-- Bottom bar -->
  <div class="bottom-bar" aria-hidden="true">
    <span class="bottom-left">Torino, Italia</span>
    <span class="bottom-right">鹿児島 Kagoshima, Japan</span>
  </div>

  <script>
    /* ========================================
       HOMEPAGE ANIMATIONS
       ======================================== */
    (function () {
      'use strict';

      const loader      = document.querySelector('.loader');
      const loaderMark  = document.querySelector('.loader-mark');
      const cornerMark  = document.querySelector('.corner-mark');
      const homepage    = document.querySelector('.homepage');
      const panelSH     = document.querySelector('.panel--sh');
      const panelIE     = document.querySelector('.panel--ie');
      const divider     = document.querySelector('.divider');
      const panels      = [panelSH, panelIE];

      /* ---------- Detect mobile ---------- */
      const isMobile = window.matchMedia('(max-width: 768px)').matches;

      /* ---------- Safety: force-clear loader after 3s ---------- */
      setTimeout(() => {
        if (loader && getComputedStyle(loader).opacity !== '0') {
          loader.style.opacity = '0';
          loader.style.pointerEvents = 'none';
          document.querySelectorAll('.sh-tagline,.sh-wordmark,.sh-guided,.sh-enter,.ie-trade-stamp,.ie-wordmark,.ie-sub,.ie-enter,.corner-mark').forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; el.style.clipPath = 'none'; });
          document.querySelectorAll('.bottom-bar span').forEach(el => el.style.opacity = '0.5');
          if (divider) { divider.style.transform = 'translateX(-50%) scaleY(1)'; }
          if (!isMobile) initHover();
        }
      }, 3000);

      /* ---------- GSAP defaults ---------- */
      gsap.defaults({ ease: 'expo.out', duration: 1 });

      /* ---------- Loading sequence ---------- */
      const loadTL = gsap.timeline({
        onComplete: () => {
          loader.style.pointerEvents = 'none';
          if (!isMobile) initHover();
        }
      });

      loadTL
        // Loader mark fades in
        .to(loaderMark, {
          opacity: 1,
          duration: 0.6,
          ease: 'power2.out'
        })
        // Hold
        .to({}, { duration: 0.5 })
        // Loader out
        .to(loader, {
          opacity: 0,
          duration: 0.5,
          ease: 'power2.inOut'
        })
        // Corner mark in
        .to(cornerMark, {
          opacity: 1,
          duration: 0.8,
          ease: 'power2.out'
        }, '-=0.2')
        // Sencha House elements
        .to('.sh-tagline', {
          opacity: 1,
          y: 0,
          duration: 0.8
        }, '-=0.5')
        .fromTo('.sh-wordmark', {
          opacity: 0,
          y: 30,
          clipPath: 'inset(100% 0 0 0)'
        }, {
          opacity: 1,
          y: 0,
          clipPath: 'inset(0% 0 0 0)',
          duration: 1.2,
          ease: 'expo.out'
        }, '-=0.6')
        .to('.sh-guided', {
          opacity: 1,
          duration: 0.6
        }, '-=0.6')
        .to('.sh-enter', {
          opacity: 1,
          duration: 0.6
        }, '-=0.4')
        // Ikeda Europe elements
        .to('.ie-trade-stamp', {
          opacity: 1,
          duration: 0.5
        }, '-=1.0')
        .fromTo('.ie-wordmark', {
          opacity: 0,
          y: 30,
          clipPath: 'inset(100% 0 0 0)'
        }, {
          opacity: 1,
          y: 0,
          clipPath: 'inset(0% 0 0 0)',
          duration: 1.2,
          ease: 'expo.out'
        }, '-=0.8')
        .to('.ie-sub', {
          opacity: 1,
          duration: 0.6
        }, '-=0.6')
        .to('.ie-enter', {
          opacity: 1,
          duration: 0.6
        }, '-=0.4')
        // Bottom bar
        .to('.bottom-bar span', {
          opacity: 0.5,
          duration: 0.6,
          stagger: 0.1
        }, '-=0.8')
        // Divider
        .fromTo(divider, {
          scaleY: 0,
          transformOrigin: 'top center'
        }, {
          scaleY: 1,
          duration: 1,
          ease: 'power3.inOut'
        }, '-=1.4');

      /* ---------- Hover expand (desktop only) ---------- */
      function initHover() {
        let currentHover = null;
        const expandRatio   = 62;
        const compressRatio = 38;
        const animDuration  = 0.7;
        const animEase      = 'power3.inOut';

        panelSH.addEventListener('mouseenter', () => {
          if (currentHover === 'sh') return;
          currentHover = 'sh';
          gsap.to(panelSH, {
            flex: `1 1 ${expandRatio}%`,
            duration: animDuration,
            ease: animEase
          });
          gsap.to(panelIE, {
            flex: `1 1 ${compressRatio}%`,
            duration: animDuration,
            ease: animEase
          });
          gsap.to(divider, {
            left: `${expandRatio}%`,
            duration: animDuration,
            ease: animEase
          });
        });

        panelIE.addEventListener('mouseenter', () => {
          if (currentHover === 'ie') return;
          currentHover = 'ie';
          gsap.to(panelIE, {
            flex: `1 1 ${expandRatio}%`,
            duration: animDuration,
            ease: animEase
          });
          gsap.to(panelSH, {
            flex: `1 1 ${compressRatio}%`,
            duration: animDuration,
            ease: animEase
          });
          gsap.to(divider, {
            left: `${100 - expandRatio}%`,
            duration: animDuration,
            ease: animEase
          });
        });

        homepage.addEventListener('mouseleave', () => {
          currentHover = null;
          gsap.to(panels, {
            flex: '1 1 50%',
            duration: animDuration,
            ease: animEase
          });
          gsap.to(divider, {
            left: '50%',
            duration: animDuration,
            ease: animEase
          });
        });
      }

      /* ---------- Subtle mouse parallax on content ---------- */
      if (!isMobile) {
        document.addEventListener('mousemove', (e) => {
          const x = (e.clientX / window.innerWidth - 0.5) * 2;  // -1 to 1
          const y = (e.clientY / window.innerHeight - 0.5) * 2;

          gsap.to('.panel--sh .panel-content', {
            x: x * -6,
            y: y * -4,
            duration: 1.2,
            ease: 'power2.out'
          });

          gsap.to('.panel--ie .panel-content', {
            x: x * 6,
            y: y * -4,
            duration: 1.2,
            ease: 'power2.out'
          });
        });
      }

    })();
  </script>

</body>
</html>
